# Production DigitalOcean setup using a managed PostgreSQL database.
# The backend reads DATABASE_URL from backend/.env. Do not put a db service here.
services:
  backend:
    build: ./backend
    restart: always
    env_file:
      - ./backend/.env
    expose:
      - "8000"
    volumes:
      - backend_uploads:/app/public/uploads
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    build: ./frontend
    restart: always
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    expose:
      - "5173"
    command: sh -c "npm run build && npm run preview -- --host 0.0.0.0 --port 5173"

  caddy:
    image: caddy:2
    restart: always
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

volumes:
  backend_uploads:
  caddy_data:
  caddy_config:
